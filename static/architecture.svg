<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Secure RAG Auditor Architecture</title>
  <desc id="desc">User requests pass through JWT authentication, prompt injection defense, ChromaDB retrieval, threat intelligence, LangGraph, Groq LLM, and PostgreSQL audit logging.</desc>
